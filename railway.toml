[build]
builder = "nixpacks"

# Railway hosts the backend: the BullMQ worker + Redis. The Nuxt web app is
# deployed to Vercel (serverless), so the scheduler + SQS poller that used to run
# as Nitro plugins now live in the worker (worker/lib/{scheduler,sqs-poller}.ts).

[[services]]
name = "worker"
# Node's native TypeScript support runs the worker entry directly.
startCommand = "node worker/index.ts"

[[services]]
name = "redis"
plugin = "redis"
