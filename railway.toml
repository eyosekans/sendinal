[build]
builder = "nixpacks"

# Three services run from this single repo.

[[services]]
name = "web"
startCommand = "node .output/server/index.mjs"
healthcheckPath = "/api/health"

[[services]]
name = "worker"
# Node's native TypeScript support runs the worker entry directly.
startCommand = "node worker/index.ts"

[[services]]
name = "redis"
plugin = "redis"
