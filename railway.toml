# Railway runs the BACKEND only: the BullMQ worker (this repo) + a Redis
# database (added separately in the dashboard: New → Database → Add Redis). The
# Nuxt web app is on Vercel.
#
# Railway's config-as-code applies to ONE service and has no `[[services]]`
# array — this file configures the worker service. Config here takes precedence
# over the dashboard, so clear any Custom Build/Start Command there to avoid
# confusion.

[build]
builder = "nixpacks"
# The worker executes TypeScript directly (Node 22+ native), so it only needs
# dependencies — skip the Nuxt app build (that artifact ships to Vercel, not here).
buildCommand = "echo 'worker service — no build step'"

[deploy]
startCommand = "node worker/index.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
